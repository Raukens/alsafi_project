{% extends "base.html" %}

{% block title %}Ликвидность{% endblock %}

{% block content %}
<ul class="nav nav-tabs" id="liquidityTab" role="tablist">
    <li class="nav-item" role="presentation">
        <button class="nav-link active" 
                id="assets-tab" 
                data-bs-toggle="tab" 
                data-bs-target="#tab-content" 
                type="button" 
                role="tab"
                hx-get="{% url 'tab_assets' %}" 
                hx-target="#tab-content"
                hx-trigger="click">
            Assets
        </button>
    </li>
    <li class="nav-item" role="presentation">
        <button class="nav-link" 
                id="liabilities-tab" 
                data-bs-toggle="tab" 
                data-bs-target="#tab-content" 
                type="button" 
                role="tab"
                hx-get="{% url 'tab_liabilities' %}" 
                hx-target="#tab-content"
                hx-trigger="click">
            Liabilities
        </button>
    </li>
    <li class="nav-item" role="presentation">
        <button class="nav-link" 
                id="bank-buffers-tab" 
                data-bs-toggle="tab" 
                data-bs-target="#tab-content" 
                type="button" 
                role="tab"
                hx-get="{% url 'tab_bank_buffers' %}" 
                hx-target="#tab-content"
                hx-trigger="click">
            Buffer by Bank
        </button>
    </li>
</ul>

<div id="tab-content" 
     class="mt-3"
     hx-get="{% url 'tab_assets' %}" 
     hx-trigger="load">
</div>
{% endblock %}
