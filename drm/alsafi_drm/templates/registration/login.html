<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — DRM</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        html, body { font-family: Tahoma, sans-serif; background: #fff; min-height: 100vh; margin: 0; }
        .login-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-card { max-width: 320px; border-radius: 1rem; }
        .login-card .card-body { border-radius: 1rem; }
        .login-card .form-control { border-radius: 0.75rem; }
        .login-card .btn { border-radius: 0.75rem; }
    </style>
</head>
<body>
    <div class="login-page">
        <div class="card shadow login-card w-100 mx-3" style="max-width: 320px;">
            <div class="card-body p-4">
                {% if form.non_field_errors %}
                    <div class="alert alert-danger rounded-3">{{ form.non_field_errors }}</div>
                {% endif %}
                <form method="post" action="{% url 'login' %}">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="id_username" class="form-label">Имя пользователя (логин)</label>
                        <input type="text" name="username" id="id_username" class="form-control"
                               value="{{ form.username.value|default:'' }}" required autofocus
                               autocomplete="username">
                        {% if form.username.errors %}<div class="invalid-feedback d-block">{{ form.username.errors }}</div>{% endif %}
                    </div>
                    <div class="mb-3">
                        <label for="id_password" class="form-label">Пароль</label>
                        <input type="password" name="password" id="id_password" class="form-control" required
                               autocomplete="current-password">
                        {% if form.password.errors %}<div class="invalid-feedback d-block">{{ form.password.errors }}</div>{% endif %}
                    </div>
                    <input type="hidden" name="next" value="{{ next }}">
                    <button type="submit" class="btn btn-primary w-100">Войти</button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
