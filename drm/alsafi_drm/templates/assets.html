<table class="table table-striped table-hover table-sm" style="width: 70%;">
    <thead class="table-dark">
        <tr>
            <th>Банк</th>
            <th>Валюта</th>
            <th>Курс</th>
            <th>Остаток в валюте</th>
            <th class="text-end">Эквивалент USD</th>
        </tr>
    </thead>
    <tbody>
        {% for row in assets %}
        <tr>
            <td>{{ row.bank }}</td>
            <td>{{ row.currency }}</td>
            <td>{{ row.fxRates }}</td>
            <td>{{ row.assetsBalanceIn|floatformat:"2g" }}</td>
            <td class="text-end">{{ row.inUsd|floatformat:"2g" }}</td>
        </tr>
        {% endfor %}
        {% if total %}
        <tr class="table-dark fw-bold">
            <td colspan="4">Total in USD</td>
            <td class="text-end">{{ total.inUsd|floatformat:"2g" }}</td>
        </tr>
        {% endif %}
    </tbody>
</table>
